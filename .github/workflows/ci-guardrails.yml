name: fisiCs CI Guardrails

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docs/**'
      - 'makefile'
      - '.github/workflows/ci-guardrails.yml'
  push:
    paths:
      - 'src/**'
      - 'tests/**'
      - 'docs/**'
      - 'makefile'
      - '.github/workflows/ci-guardrails.yml'

jobs:
  guardrails:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout shared core dependencies
        uses: actions/checkout@v4
        with:
          repository: calebsv19/cosm-fabriC
          path: shared
          fetch-depth: 1

      - name: Install toolchain
        shell: bash
        run: |
          set -euo pipefail
          brew install llvm gperf
          echo "$(brew --prefix llvm)/bin" >> "$GITHUB_PATH"

      - name: Run ABI and release guardrails
        shell: bash
        run: |
          set -euo pipefail
          make ci-guardrails \
            CORE_BASE_DIR=shared/core/core_base \
            CORE_IO_DIR=shared/core/core_io \
            CORE_DATA_DIR=shared/core/core_data \
            CORE_PACK_DIR=shared/core/core_pack \
            SYS_SHIMS_DIR=shared/sys_shims

      - name: Upload release artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fisics-release-artifacts
          path: |
            build/release/*.manifest.txt
            build/release/*.zip
            build/release/*.tar.gz
            build/release/*.sha256
